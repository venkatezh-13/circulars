<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exchange Circulars</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --z-blue:    #387ED1;
    --z-yellow:  #FFA412;
    --z-grey:    #424242;
    --white:     #FFFFFF;
    --text-h:    #1b1b1b;
    --text-body: #444444;
    --text-muted:#888888;
    --text-label:#aaaaaa;
    --bg:        #f8f8f9;
    --stroke:    #E7E7E7;
    --stroke-2:  #dddddd;
    --nse:       #0a6640;
    --bse:       #8b1a1a;
    --mcx:       #7c4a00;
    --r8:        8px;
    --r16:       16px;
    --r32:       32px;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-body);
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── Nav ── */
  .nav {
    background: var(--white);
    border-bottom: 1px solid var(--stroke);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .nav-logo img {
    height: 22px;
    display: block;
  }

  .nav-links {
    display: flex;
    gap: 24px;
    list-style: none;
    margin-left: auto;
  }

  .nav-links a {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-body);
    text-decoration: none;
    white-space: nowrap;
  }

  .nav-links a:hover {
    color: var(--z-blue);
  }

  .nav-signup {
    background: var(--z-blue) !important;
    color: var(--white) !important;
    padding: 6px 16px;
    border-radius: var(--r8);
  }

  .nav-signup:hover {
    opacity: .88;
  }

  /* ── Sub-nav ── */
  .subnav {
    background: var(--white);
    border-bottom: 1px solid var(--stroke);
  }

  .subnav-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
  }

  .subnav a {
    display: block;
    padding: 13px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    text-decoration: none;
    border-bottom: 2px solid transparent;
    transition: all .15s;
    white-space: nowrap;
  }

  .subnav a:hover {
    color: var(--z-blue);
  }

  .subnav a.active {
    color: var(--z-blue);
    border-bottom-color: var(--z-blue);
  }

  /* ── Page ── */
  .page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 24px 32px;
  }

  .page-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-h);
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }

  .page-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
    margin-top: -8px;
  }

  /* ── RSS links in header ── */
  .header-rss-group {
    display: flex;
    align-items: center;
    gap: 2px;
    margin-left: 12px;
    padding-left: 16px;
    border-left: 1px solid var(--stroke);
  }

  .rss-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 9px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-decoration: none;
    border-radius: var(--r8);
    transition: all .15s;
    white-space: nowrap;
  }

  .rss-link:hover {
    background: var(--bg);
    color: var(--text-body);
  }

  .rss-link.rss-all {
    color: var(--z-blue);
  }

  .rss-link.rss-all:hover {
    background: rgba(56,126,209,.07);
  }

  .rss-icon {
    width: 13px;
    height: 13px;
    flex-shrink: 0;
    color: var(--z-yellow);
  }

  /* ── Filter bar ── */
  .filter-bar {
    background: var(--white);
    border: 1px solid var(--stroke);
    border-radius: var(--r8);
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-label);
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 9px 12px 9px 34px;
    border: 1px solid var(--stroke-2);
    border-radius: var(--r8);
    font-family: inherit;
    font-size: 13px;
    color: var(--text-h);
    background: var(--bg);
    outline: none;
    transition: border-color .15s;
  }

  .search-input:focus {
    border-color: var(--z-blue);
    background: var(--white);
  }

  .search-input::placeholder {
    color: var(--text-label);
  }

  .date-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .date-lbl {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .date-input {
    padding: 8px 10px;
    border: 1px solid var(--stroke-2);
    border-radius: var(--r8);
    font-family: inherit;
    font-size: 13px;
    color: var(--text-h);
    background: var(--bg);
    outline: none;
    transition: border-color .15s;
  }

  .date-input:focus {
    border-color: var(--z-blue);
    background: var(--white);
  }

  .chips {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-wrap: wrap;
  }

  .chip {
    padding: 5px 10px;
    border: 1px solid var(--stroke-2);
    border-radius: var(--r8);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--bg);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    min-width: 36px;
    text-align: center;
  }

  .chip:hover {
    border-color: var(--z-blue);
    color: var(--z-blue);
    background: rgba(56, 126, 209, .05);
  }

  .chip.active {
    background: var(--z-blue);
    border-color: var(--z-blue);
    color: var(--white);
    font-weight: 600;
  }

  .chip-custom.active {
    background: var(--bg);
    border-color: var(--z-blue);
    color: var(--z-blue);
  }

  .btn-clear {
    padding: 5px 10px;
    border: 1px solid transparent;
    border-radius: var(--r8);
    font-family: inherit;
    font-size: 12px;
    color: var(--text-label);
    background: transparent;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }

  .btn-clear:hover {
    border-color: var(--stroke-2);
    color: var(--text-body);
  }

  /* custom date row — shown only when Custom chip active */
  .custom-date-row {
    display: none;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding-top: 4px;
  }

  .custom-date-row.visible {
    display: flex;
  }

  /* ── Stats ── */
  .stats {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .stats strong {
    color: var(--text-h);
  }

  .stat-nse { color: var(--nse); font-weight: 600; }
  .stat-bse { color: var(--bse); font-weight: 600; }
  .stat-mcx { color: var(--mcx); font-weight: 600; }

  /* ── Table ── */
  .table-wrap {
    background: var(--white);
    border: 1px solid var(--stroke);
    border-radius: var(--r8);
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    padding: 10px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-label);
    background: var(--bg);
    border-bottom: 1px solid var(--stroke);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  thead th:hover {
    color: var(--text-muted);
  }

  thead th.sorted {
    color: var(--z-blue);
  }

  .sort-icon {
    margin-left: 3px;
    font-size: 9px;
    opacity: .5;
  }

  thead th.sorted .sort-icon {
    opacity: 1;
  }

  tbody tr {
    border-bottom: 1px solid var(--stroke);
    transition: background .1s;
  }

  tbody tr:last-child {
    border-bottom: none;
  }

  tbody tr:hover {
    background: #fafbfd;
  }

  tbody td {
    padding: 11px 16px;
    vertical-align: middle;
  }

  .td-date {
    width: 108px;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .td-ex {
    width: 68px;
  }

  .ex-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: var(--r32);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .ex-NSE { background: rgba(10, 102, 64, .08); color: var(--nse); }
  .ex-BSE { background: rgba(139, 26, 26, .08); color: var(--bse); }
  .ex-MCX { background: rgba(124, 74,  0, .08); color: var(--mcx); }

  .td-ref {
    width: 160px;
    font-size: 11px;
    color: var(--text-label);
    font-family: 'SF Mono', monospace;
    white-space: nowrap;
  }

  .td-subject a {
    color: var(--z-blue);
    text-decoration: none;
    font-weight: 500;
    font-size: 13px;
    line-height: 1.4;
  }

  .td-subject a:hover {
    text-decoration: underline;
  }

  .td-cat {
    font-size: 11px;
    color: var(--text-label);
    margin-top: 2px;
  }

  .td-pdf {
    width: 48px;
    text-align: center;
  }

  .file-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: var(--r8);
    background: var(--bg);
    border: 1px solid var(--stroke-2);
    text-decoration: none;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.3px;
    transition: all .15s;
  }

  .file-btn.type-pdf { color: #c0392b; }
  .file-btn.type-pdf:hover { background: #c0392b; color: var(--white); border-color: #c0392b; }

  .file-btn.type-xls { color: #27ae60; }
  .file-btn.type-xls:hover { background: #27ae60; color: var(--white); border-color: #27ae60; }

  .file-btn.type-zip { color: #8e44ad; }
  .file-btn.type-zip:hover { background: #8e44ad; color: var(--white); border-color: #8e44ad; }

  .file-btn.type-csv { color: #2980b9; }
  .file-btn.type-csv:hover { background: #2980b9; color: var(--white); border-color: #2980b9; }

  /* ── Loading ── */
  .loading-bar {
    height: 2px;
    background: var(--stroke);
    overflow: hidden;
    border-radius: 2px;
    margin-bottom: 20px;
  }

  .loading-bar-inner {
    height: 100%;
    width: 30%;
    background: var(--z-blue);
    animation: loading 1.1s ease-in-out infinite;
  }

  @keyframes loading {
    0%   { transform: translateX(-200%); }
    100% { transform: translateX(500%);  }
  }

  /* ── Pagination ── */
  .pagination {
    display: flex;
    gap: 4px;
    justify-content: center;
    align-items: center;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .page-btn {
    padding: 6px 11px;
    border: 1px solid var(--stroke-2);
    border-radius: var(--r8);
    background: var(--white);
    color: var(--text-body);
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    min-width: 34px;
    text-align: center;
    transition: all .15s;
  }

  .page-btn:hover:not(:disabled) {
    border-color: var(--z-blue);
    color: var(--z-blue);
  }

  .page-btn.active {
    background: var(--z-blue);
    border-color: var(--z-blue);
    color: var(--white);
    font-weight: 600;
  }

  .page-btn:disabled {
    opacity: .3;
    cursor: default;
  }

  .page-ellipsis {
    font-size: 13px;
    color: var(--text-label);
    padding: 0 4px;
  }

  .page-info {
    font-size: 12px;
    color: var(--text-label);
    padding: 0 8px;
  }

  .page-jump {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: 8px;
  }

  .page-jump-label {
    font-size: 12px;
    color: var(--text-label);
  }

  .page-jump-input {
    width: 48px;
    padding: 5px 8px;
    border: 1px solid var(--stroke-2);
    border-radius: var(--r8);
    font-family: inherit;
    font-size: 12px;
    color: var(--text-h);
    background: var(--white);
    outline: none;
    text-align: center;
  }

  .page-jump-input:focus {
    border-color: var(--z-blue);
  }

  .page-jump-btn {
    padding: 5px 10px;
    border: 1px solid var(--stroke-2);
    border-radius: var(--r8);
    background: var(--white);
    color: var(--text-body);
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    transition: all .15s;
  }

  .page-jump-btn:hover {
    border-color: var(--z-blue);
    color: var(--z-blue);
  }

  /* ── Empty state ── */
  .state-box {
    text-align: center;
    padding: 56px 24px;
    color: var(--text-muted);
    background: var(--white);
    border: 1px solid var(--stroke);
    border-radius: var(--r8);
  }

  .state-box .icon {
    font-size: 32px;
    margin-bottom: 12px;
  }

  .state-box p {
    font-size: 14px;
  }

  /* ── Highlight ── */
  mark {
    background: rgba(56, 126, 209, .14);
    color: inherit;
    border-radius: 2px;
    padding: 0 2px;
  }

  /* ── Footer ── */
  .footer {
    border-top: 1px solid var(--stroke);
    margin-top: 48px;
    padding: 24px;
    text-align: center;
    font-size: 12px;
    color: var(--text-label);
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .page { padding: 24px 16px; }
    .nav-inner { padding: 0 16px; }
    .nav-links li:nth-child(n+2):nth-child(-n+3) { display: none; }
    .td-ref, .td-pdf { display: none; }
    .subnav-inner { overflow-x: auto; }
  }

  /* ── Site header ── */
  .site-header {
    background: var(--white);
    border-bottom: 1px solid var(--stroke);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .site-header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .site-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--z-blue);
    letter-spacing: -0.3px;
    white-space: nowrap;
    font-family: 'Inter', system-ui, sans-serif;
  }

  .header-nav {
    display: flex;
    margin-left: auto;
    gap: 0;
  }

  .header-tab {
    display: block;
    padding: 18px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    text-decoration: none;
    border-bottom: 2px solid transparent;
    transition: all .15s;
    white-space: nowrap;
  }

  .header-tab:hover { color: var(--z-blue); }
  .header-tab.active { color: var(--z-blue); border-bottom-color: var(--z-blue); }
  .header-tab[data-ex=NSE].active { color: var(--nse); border-bottom-color: var(--nse); }
  .header-tab[data-ex=BSE].active { color: var(--bse); border-bottom-color: var(--bse); }
  .header-tab[data-ex=MCX].active { color: var(--mcx); border-bottom-color: var(--mcx); }

</style>
</head>
<body>

<!-- ── Header ── -->
<div class="site-header">
  <div class="site-header-inner">
    <h1 class="site-title">Exchange Circulars</h1>
    <nav class="header-nav">
      <a href="#" class="header-tab active" data-ex="ALL" onclick="setEx('ALL',this);return false;">All</a>
      <a href="#" class="header-tab" data-ex="NSE" onclick="setEx('NSE',this);return false;">NSE</a>
      <a href="#" class="header-tab" data-ex="BSE" onclick="setEx('BSE',this);return false;">BSE</a>
      <a href="#" class="header-tab" data-ex="MCX" onclick="setEx('MCX',this);return false;">MCX</a>
    </nav>
  </div>
</div>

<!-- ── Page ── -->
<div class="page">

  <!-- Filter bar -->
  <div class="filter-bar">

    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" type="text" id="search-input"
             placeholder="Search by subject, keyword or reference…" autocomplete="off">
    </div>

    <div class="chips">
      <button class="chip" data-range="1"   onclick="setQuick(1,   this)">1D</button>
      <button class="chip" data-range="7"   onclick="setQuick(7,   this)">7D</button>
      <button class="chip" data-range="30"  onclick="setQuick(30,  this)">1M</button>
      <button class="chip" data-range="90"  onclick="setQuick(90,  this)">3M</button>
      <button class="chip" data-range="180" onclick="setQuick(180, this)">6M</button>
      <button class="chip" data-range="365" onclick="setQuick(365, this)">1Y</button>
      <button class="chip chip-custom" id="chip-custom" onclick="toggleCustom()">Custom</button>
      <button class="btn-clear" onclick="clearAll()">Clear</button>
    </div>

    <div class="custom-date-row" id="custom-date-row">
      <span class="date-lbl">From</span>
      <input class="date-input" type="date" id="date-from">
      <span class="date-lbl">To</span>
      <input class="date-input" type="date" id="date-to">
    </div>

  </div>

  <!-- Loading -->
  <div id="loading-state">
    <div class="loading-bar"><div class="loading-bar-inner"></div></div>
    <div style="text-align:center; color:var(--text-muted); font-size:14px; padding:24px 0;">
      Loading circulars…
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats" style="display:none"></div>

  <!-- Table -->
  <div class="table-wrap" id="table-wrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th class="sorted" data-col="date_iso" onclick="sortBy('date_iso')">
            Date <span class="sort-icon">↓</span>
          </th>
          <th data-col="exchange" onclick="sortBy('exchange')">
            Exchange <span class="sort-icon">↕</span>
          </th>
          <th data-col="ref" onclick="sortBy('ref')">
            Ref No. <span class="sort-icon">↕</span>
          </th>
          <th>Subject</th>
          <th>File</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <!-- Empty state -->
  <div id="empty-state" style="display:none" class="state-box">
    <div class="icon">🔍</div>
    <p>No circulars match your filters.</p>
  </div>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>

</div>

<!-- ── Footer ── -->
<div class="footer">
  <div style="margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap;">
    <span style="color:var(--text-label); font-size:12px;">RSS feeds</span>
    <a class="rss-link rss-all" href="rss/all.xml" target="_blank" rel="noopener" style="font-size:12px;">
      <svg class="rss-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/></svg>
      All
    </a>
    <a class="rss-link" href="rss/nse.xml" target="_blank" rel="noopener" style="font-size:12px; color:var(--nse)">
      <svg class="rss-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/></svg>
      NSE
    </a>
    <a class="rss-link" href="rss/bse.xml" target="_blank" rel="noopener" style="font-size:12px; color:var(--bse)">
      <svg class="rss-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/></svg>
      BSE
    </a>
    <a class="rss-link" href="rss/mcx.xml" target="_blank" rel="noopener" style="font-size:12px; color:var(--mcx)">
      <svg class="rss-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/></svg>
      MCX
    </a>
  </div>
  Exchange Circulars — NSE · BSE · MCX
</div>

<script>
const PAGE_SIZE = 50;
let allData     = [];
let filtered    = [];
let sortCol     = 'date_iso';
let sortDir     = -1;   // -1 = descending = newest first, always
let currentEx   = 'ALL';
let currentPage = 1;
let activeRange = null;

// ── "DD Mon YYYY" → "YYYY-MM-DD" fallback if date_iso is ever missing ────────
const MONTHS = {
  Jan:'01', Feb:'02', Mar:'03', Apr:'04', May:'05', Jun:'06',
  Jul:'07', Aug:'08', Sep:'09', Oct:'10', Nov:'11', Dec:'12'
};

function toSortKey(r) {
  if (r.date_iso) return r.date_iso;
  const m = String(r.date || '').match(/(\d{1,2})\s+(\w{3})\s+(\d{4})/);
  return m ? `${m[3]}-${MONTHS[m[2]] || '00'}-${m[1].padStart(2, '0')}` : '';
}

// ── Load data ─────────────────────────────────────────────────────────────────
async function loadData() {
  const initialHash = location.hash.slice(1);
  if (initialHash && !initialHash.includes('=') && !Object.keys({nse:1,bse:1,mcx:1,all:1,'7d':1,'30d':1,'1y':1,week:1,month:1,year:1}).includes(initialHash.toLowerCase())) {
    history.replaceState(null, '', location.pathname);
  }

  try {
    const res = await fetch('search_index.json');
    if (!res.ok) throw new Error(res.status);
    allData = await res.json();

    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('stats').style.display         = 'flex';
    document.getElementById('table-wrap').style.display    = '';

    const hashAliases = {
      'nse':   { ex: 'NSE' },
      'bse':   { ex: 'BSE' },
      'mcx':   { ex: 'MCX' },
      'all':   { ex: 'ALL' },
      '7d':    { range: 7   }, 'week':  { range: 7   },
      '30d':   { range: 30  }, 'month': { range: 30  },
      '1y':    { range: 365 }, 'year':  { range: 365 },
    };

    const hash = location.hash.slice(1);
    if (hash) {
      if (hash.includes('=')) {
        const hp = new URLSearchParams(hash);
        if (hp.get('ex'))    currentEx = hp.get('ex').toUpperCase();
        if (hp.get('range')) applyQuickRange(parseInt(hp.get('range')));
        if (hp.get('from'))  document.getElementById('date-from').value = hp.get('from');
        if (hp.get('to'))    document.getElementById('date-to').value   = hp.get('to');
        if (hp.get('q'))     document.getElementById('search-input').value = decodeURIComponent(hp.get('q'));
      } else {
        const alias = hashAliases[hash.toLowerCase()];
        if (alias) {
          if (alias.ex)    currentEx = alias.ex;
          if (alias.range) applyQuickRange(alias.range);
        } else {
          document.getElementById('search-input').value = decodeURIComponent(hash);
        }
      }
    }

    const qp = new URLSearchParams(location.search);
    if (qp.get('ex'))    currentEx = qp.get('ex').toUpperCase();
    if (qp.get('range')) applyQuickRange(parseInt(qp.get('range')));
    if (qp.get('q'))     document.getElementById('search-input').value = qp.get('q');
    if (qp.get('from'))  document.getElementById('date-from').value = qp.get('from');
    if (qp.get('to'))    document.getElementById('date-to').value   = qp.get('to');

    syncHeaderTabs();
    applyFilters();

  } catch (e) {
    document.getElementById('loading-state').innerHTML =
      '<div class="state-box">' +
        '<div class="icon">⚠️</div>' +
        '<p>Could not load data. Serve via <code>python -m http.server</code> from the docs/ folder.</p>' +
      '</div>';
  }
}

// ── Quick date range chips ────────────────────────────────────────────────────
function setQuick(days, el) {
  document.querySelectorAll('.chip[data-range]').forEach(c => c.classList.remove('active'));
  document.getElementById('chip-custom').classList.remove('active');
  document.getElementById('custom-date-row').classList.remove('visible');

  if (activeRange === days) {
    activeRange = null;
    document.getElementById('date-from').value = '';
    document.getElementById('date-to').value   = '';
    applyFilters();
    return;
  }

  activeRange = days;
  el.classList.add('active');

  const today = new Date();
  const from  = new Date();
  from.setDate(today.getDate() - days);

  document.getElementById('date-to').value   = today.toISOString().slice(0, 10);
  document.getElementById('date-from').value = from.toISOString().slice(0, 10);
  applyFilters();
}

// ── Custom date range toggle ──────────────────────────────────────────────────
function toggleCustom() {
  const chip = document.getElementById('chip-custom');
  const row  = document.getElementById('custom-date-row');
  const isActive = chip.classList.contains('active');

  document.querySelectorAll('.chip[data-range]').forEach(c => c.classList.remove('active'));

  if (isActive) {
    chip.classList.remove('active');
    row.classList.remove('visible');
    activeRange = null;
    document.getElementById('date-from').value = '';
    document.getElementById('date-to').value   = '';
    applyFilters();
  } else {
    chip.classList.add('active');
    row.classList.add('visible');
    activeRange = null;
  }
}

// ── Apply filters and sort ────────────────────────────────────────────────────
function applyFilters() {
  const kw   = document.getElementById('search-input').value.trim().toLowerCase();
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;

  filtered = allData.filter(r => {
    if (currentEx !== 'ALL' && r.exchange !== currentEx) return false;
    const d = toSortKey(r);
    if (from && d < from) return false;
    if (to   && d > to)   return false;
    if (kw) {
      const hay = (r.subject + ' ' + r.ref + ' ' + r.category).toLowerCase();
      if (!kw.split(' ').every(w => hay.includes(w))) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    const av = sortCol === 'date_iso' ? toSortKey(a) : (a[sortCol] || '');
    const bv = sortCol === 'date_iso' ? toSortKey(b) : (b[sortCol] || '');
    return av > bv ? sortDir : av < bv ? -sortDir : 0;
  });

  currentPage = 1;
  updateHash();
  render();
}

// ── Render table ──────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function hl(text, kw) {
  if (!kw) return esc(text);
  const words = kw.split(' ')
    .filter(Boolean)
    .map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  return esc(text).replace(
    new RegExp(`(${words.join('|')})`, 'gi'),
    '<mark>$1</mark>'
  );
}

function render() {
  const kw    = document.getElementById('search-input').value.trim().toLowerCase();
  const total = filtered.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  const slice = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

  const nN = filtered.filter(r => r.exchange === 'NSE').length;
  const bN = filtered.filter(r => r.exchange === 'BSE').length;
  const mN = filtered.filter(r => r.exchange === 'MCX').length;

  document.getElementById('stats').innerHTML =
    `<span><strong>${total.toLocaleString()}</strong> circulars</span>` +
    `<span class="stat-nse">NSE: ${nN}</span>` +
    `<span class="stat-bse">BSE: ${bN}</span>` +
    `<span class="stat-mcx">MCX: ${mN}</span>` +
    (kw ? `<span>Keyword: <strong>${esc(kw)}</strong></span>` : '');

  if (!slice.length) {
    document.getElementById('table-wrap').style.display  = 'none';
    document.getElementById('empty-state').style.display = '';
    document.getElementById('pagination').innerHTML      = '';
    return;
  }

  document.getElementById('table-wrap').style.display  = '';
  document.getElementById('empty-state').style.display = 'none';

  document.getElementById('tbody').innerHTML = slice.map(r => {
    const subj = hl(r.subject || '—', kw);
    const ref  = hl(r.ref     || '',  kw);
    const link = r.link || '';
    const linkLower = link.toLowerCase();
    let fileType = 'pdf';
    let fileLabel = 'PDF';
    if (linkLower.endsWith('.zip')) {
      fileType = 'zip';
      fileLabel = 'ZIP';
    } else if (linkLower.endsWith('.xlsx') || linkLower.endsWith('.xls')) {
      fileType = 'xls';
      fileLabel = 'XLS';
    } else if (linkLower.endsWith('.csv')) {
      fileType = 'csv';
      fileLabel = 'CSV';
    }
    const fileBtn = link
      ? `<a class="file-btn type-${fileType}" href="${esc(link)}" target="_blank" rel="noopener">${fileLabel}</a>`
      : '';
    return `<tr>
      <td class="td-date">${esc(r.date || '')}</td>
      <td class="td-ex"><span class="ex-badge ex-${r.exchange}">${r.exchange}</span></td>
      <td class="td-ref">${ref}</td>
      <td class="td-subject">
        ${link
          ? `<a href="${esc(link)}" target="_blank" rel="noopener">${subj}</a>`
          : subj}
        ${r.category ? `<div class="td-cat">${esc(r.category)}</div>` : ''}
      </td>
      <td class="td-pdf">${fileBtn}</td>
    </tr>`;
  }).join('');

  renderPagination(pages);
}

// ── Pagination ────────────────────────────────────────────────────────────────
function renderPagination(pages) {
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;

  const range = buildRange(currentPage, pages);
  let prev = null;
  for (const p of range) {
    if (prev !== null && p - prev > 1) html += `<span class="page-ellipsis">…</span>`;
    html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
    prev = p;
  }

  html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === pages ? 'disabled' : ''}>›</button>`;
  html += `<span class="page-info">Page ${currentPage} / ${pages}</span>`;
  html += `<div class="page-jump">
    <span class="page-jump-label">Go to:</span>
    <input type="number" class="page-jump-input" id="page-jump-input" min="1" max="${pages}" value="${currentPage}" onkeydown="if(event.key==='Enter')jumpToPage()">
    <button class="page-jump-btn" onclick="jumpToPage()">Go</button>
  </div>`;
  el.innerHTML = html;
}

function buildRange(cur, total) {
  const s = new Set([1, total]);
  for (let i = Math.max(2, cur - 2); i <= Math.min(total - 1, cur + 2); i++) s.add(i);
  return [...s].sort((a, b) => a - b);
}

function goPage(p) {
  const pages = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > pages) return;
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function jumpToPage() {
  const input = document.getElementById('page-jump-input');
  const p = parseInt(input.value);
  if (isNaN(p)) return;
  goPage(p);
}

// ── Sort ──────────────────────────────────────────────────────────────────────
function sortBy(col) {
  sortDir = (sortCol === col) ? sortDir * -1 : -1;
  sortCol = col;

  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted');
    const ic = th.querySelector('.sort-icon');
    if (ic) ic.textContent = '↕';
  });

  const th = document.querySelector(`thead th[data-col="${col}"]`);
  if (th) {
    th.classList.add('sorted');
    th.querySelector('.sort-icon').textContent = sortDir === -1 ? '↓' : '↑';
  }

  applyFilters();
}

// ── Apply quick date range by number of days ─────────────────────────────────
function applyQuickRange(days) {
  const chipEl = document.querySelector(`.chip[data-range="${days}"]`);
  if (chipEl) {
    document.querySelectorAll('.chip[data-range]').forEach(c => c.classList.remove('active'));
    document.getElementById('chip-custom').classList.remove('active');
    document.getElementById('custom-date-row').classList.remove('visible');
    activeRange = days;
    chipEl.classList.add('active');
  }
  const today = new Date(), from = new Date();
  from.setDate(today.getDate() - days);
  document.getElementById('date-to').value   = today.toISOString().slice(0, 10);
  document.getElementById('date-from').value = from.toISOString().slice(0, 10);
}

// ── Sync header tabs ─────────────────────────────────────────────────────────
function syncHeaderTabs() {
  document.querySelectorAll('.header-tab').forEach(t => t.classList.remove('active'));
  const active = document.querySelector(`.header-tab[data-ex="${currentEx}"]`);
  if (active) active.classList.add('active');
}

// ── Exchange filter ───────────────────────────────────────────────────────────
function setEx(ex, el) {
  currentEx = ex;
  syncHeaderTabs();
  applyFilters();
}

// ── Clear all filters ─────────────────────────────────────────────────────────
function clearAll() {
  document.getElementById('search-input').value = '';
  document.getElementById('date-from').value    = '';
  document.getElementById('date-to').value      = '';
  document.querySelectorAll('.chip[data-range]').forEach(c => c.classList.remove('active'));
  document.getElementById('chip-custom').classList.remove('active');
  document.getElementById('custom-date-row').classList.remove('visible');

  activeRange = null;
  currentEx   = 'ALL';
  sortCol     = 'date_iso';
  sortDir     = -1;

  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted');
    const ic = th.querySelector('.sort-icon');
    if (ic) ic.textContent = '↕';
  });
  const dateTh = document.querySelector('thead th[data-col="date_iso"]');
  if (dateTh) {
    dateTh.classList.add('sorted');
    dateTh.querySelector('.sort-icon').textContent = '↓';
  }

  syncHeaderTabs();
  applyFilters();
}

// ── Update URL hash to reflect current state ─────────────────────────────────
function updateHash() {
  const kw   = document.getElementById('search-input').value.trim();
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;

  const parts = [];
  if (currentEx !== 'ALL') parts.push('ex=' + currentEx.toLowerCase());
  if (activeRange)         parts.push('range=' + activeRange);
  if (from)                parts.push('from=' + from);
  if (to)                  parts.push('to=' + to);

  let hash = parts.length ? parts.join('&') : '';
  if (kw) hash = hash ? hash + '&q=' + encodeURIComponent(kw) : 'q=' + encodeURIComponent(kw);

  history.replaceState(null, '', hash ? '#' + hash : location.pathname);
}

// ── Event listeners ───────────────────────────────────────────────────────────
let debounce;
document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(applyFilters, 250);
});

document.getElementById('date-from').addEventListener('change', () => {
  document.querySelectorAll('.chip[data-range]').forEach(c => c.classList.remove('active'));
  document.getElementById('chip-custom').classList.add('active');
  document.getElementById('custom-date-row').classList.add('visible');
  activeRange = null;
  applyFilters();
});

document.getElementById('date-to').addEventListener('change', () => {
  document.querySelectorAll('.chip[data-range]').forEach(c => c.classList.remove('active'));
  document.getElementById('chip-custom').classList.add('active');
  document.getElementById('custom-date-row').classList.add('visible');
  activeRange = null;
  applyFilters();
});

// ── Init ──────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
