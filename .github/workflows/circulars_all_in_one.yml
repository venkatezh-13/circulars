name: Circulars — Daily Poll

# ──────────────────────────────────────────────────────────────────────────────
# SCHEDULES
#   • Poll  : every 15 min, 6:00 AM – 1:00 AM IST (0:30–19:30 UTC)
#             GitHub's minimum cron interval is 5 min, but 15 min is safer
#             against Actions queue delays and exchange rate-limits.
#             Change to '*/5' if you want 5-min polling (uses ~3× more minutes).
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Poll — every 15 min during market hours (6 AM – 1 AM IST = 0:30-19:30 UTC)
    - cron: '*/15 0-19 * * *'

  workflow_dispatch:
    inputs:
      exchanges:
        description: 'Which exchanges to poll'
        required: false
        default: 'all'
        type: choice
        options: [all, nse, bse, mcx, sebi]

# Only allow one run at a time per ref — prevents concurrent git push conflicts
concurrency:
  group: circulars-${{ github.ref }}
  cancel-in-progress: false   # don't cancel; queue instead

jobs:

  # ── Step 1: Setup exchange flags ────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      run_nse:      ${{ steps.setup_exchanges.outputs.run_nse }}
      run_bse:      ${{ steps.setup_exchanges.outputs.run_bse }}
      run_mcx:      ${{ steps.setup_exchanges.outputs.run_mcx }}
      run_sebi:     ${{ steps.setup_exchanges.outputs.run_sebi }}
    steps:
      - name: Setup exchanges
        id: setup_exchanges
        run: |
          EXCHANGES="${{ github.event.inputs.exchanges || 'all' }}"
          for EX in nse bse mcx sebi; do
            if [ "$EXCHANGES" = "all" ] || [ "$EXCHANGES" = "$EX" ]; then
              echo "run_${EX}=true" >> $GITHUB_OUTPUT
            else
              echo "run_${EX}=false" >> $GITHUB_OUTPUT
            fi
          done

  # ── Step 2: Scrape today (poll) ────────────────────────────────────────────
  poll:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx requests beautifulsoup4

      # NSE
      - name: Scrape NSE
        if: needs.setup.outputs.run_nse == 'true'
        run: python scrapers/run_nse.py
        timeout-minutes: 10

      # BSE
      - name: Scrape BSE
        if: needs.setup.outputs.run_bse == 'true'
        run: python scrapers/run_bse.py
        timeout-minutes: 15

      # MCX
      - name: Scrape MCX
        if: needs.setup.outputs.run_mcx == 'true'
        run: python scrapers/run_mcx.py
        timeout-minutes: 10

      # SEBI ────────────────────────────────────────────────────────────────────
      - name: Scrape SEBI
        if: needs.setup.outputs.run_sebi == 'true'
        run: python scrapers/run_sebi.py
        timeout-minutes: 10

      - name: Commit new data
        run: |
          git config user.email "circulars-bot@github-actions"
          git config user.name  "Circulars Bot"
          git add data/
          if git diff --staged --quiet; then
            echo "No new circulars this poll."
          else
            git commit -m "poll: circulars $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi

  # ── Step 3: Rebuild search index ────────────────────────────────────────────
  rebuild-index:
    needs: poll
    if: always() && needs.poll.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: main           # pull latest — picks up commits from above jobs
          fetch-depth: 1

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx requests beautifulsoup4

      - name: Rebuild search index
        run: python scripts/build_index.py

      - name: Commit index
        run: |
          git config user.email "circulars-bot@github-actions"
          git config user.name  "Circulars Bot"
          git add docs/search_index.json docs/rss/ || true
          if git diff --staged --quiet; then
            echo "No index changes."
          else
            git commit -m "index: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi
